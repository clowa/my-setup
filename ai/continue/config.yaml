name: Local Config
version: 1.0.0
schema: v1
models:
  #############################################################################
  # Ollama

  - name: Autodetect
    provider: ollama
    model: AUTODETECT
    roles:
      - chat
      - edit
      - apply
      - rerank
      - autocomplete
    autocompleteOptions:
      debounceDelay: 800
      onlyMyCode: true

  - name: gemma4
    provider: ollama
    model: gemma4:e4b-mlx
    roles:
      - autocomplete
    autocompleteOptions:
      debounceDelay: 500
    requestOptions:
      extraBodyProperties:
        think: false # thinking makes autocomplete slower

  - name: qwen2.5-coder
    provider: ollama
    model: qwen2.5-coder:7b
    roles:
      - chat
      - edit
      - apply
      - rerank
      - autocomplete
    autocompleteOptions:
      debounceDelay: 500
    requestOptions:
      extraBodyProperties:
        think: false # thinking makes autocomplete slower

  - name: apfel
    provider: openai
    model: apple-foundationmodel
    apiBase: http://localhost:11434/v1
    useLegacyCompletionsEndpoint: false
    roles:
      - autocomplete
    promptTemplates:
      autocomplete: |
        You are a code completion engine. Complete the {{{language}}} code at the cursor position marked by <CURSOR>.
        Output ONLY the raw code to insert. No explanations. No markdown. No commentary.

        File: {{{filename}}}

        {{{prefix}}}<CURSOR>{{{suffix}}}
    autocompleteOptions:
      modelTimeout: 12000
      showWhateverWeHaveAtXMs: 900 # return partial completion rather than nothing
      debounceDelay: 1000 # reduce request spam while typing
      maxPromptTokens: 512 # smaller budget = faster, less context overload
      multilineCompletions: "never" # local/chat models over-complete without FIM training
      useCache: true # skip round-trip for repeated prefix/suffix combos
      useRecentlyEdited: false # reduces prompt overhead, saves token budget
    requestOptions:
      extraBodyProperties:
        stop: null # apfel doesn't support stop tokens
        think: false # apfel has no thinking

